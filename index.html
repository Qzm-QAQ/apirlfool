<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>GAGA-OS 异常窗口</title>
  <style>
    :root {
      --bg: #090b12;
      --panel: #0f1422;
      --panel2: #151b2d;
      --line: rgba(140, 160, 255, 0.16);
      --text: #edf1ff;
      --muted: #9aa7d8;
      --accent: #86a8ff;
      --accent2: #8f6bff;
      --danger: #ff5a74;
      --warn: #ffb347;
      --ok: #4ade80;
      --shadow: 0 24px 70px rgba(0,0,0,.5);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0; min-height: 100%; width: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(134,168,255,.14), transparent 25%),
        radial-gradient(circle at 100% 0%, rgba(143,107,255,.18), transparent 25%),
        linear-gradient(180deg, #060810, #0a0f18 50%, #090b12 100%);
      overflow-x: hidden;
    }
    .scan::before {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: repeating-linear-gradient(to bottom, rgba(255,255,255,.028) 0, rgba(255,255,255,.028) 1px, transparent 2px, transparent 4px);
      opacity: .2;
    }
    .app {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 18px 14px 26px; position: relative; z-index: 1;
    }
    .shell {
      width: 100%; max-width: 430px; border-radius: 24px; overflow: hidden;
      background: linear-gradient(180deg, rgba(17,22,38,.96), rgba(11,15,27,.98));
      border: 1px solid var(--line); box-shadow: var(--shadow); position: relative;
    }
    .topbar {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 10px 14px; color: var(--muted); font-size: 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,0));
    }
    .dots { display: flex; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.red { background: #ff5f57; }
    .dot.yellow { background: #febc2e; }
    .dot.green { background: #28c840; }
    .content { padding: 18px 16px 18px; }
    .badge {
      display: inline-flex; align-items: center; gap: 8px; margin-bottom: 14px;
      padding: 8px 12px; border-radius: 999px; font-size: 12px; font-weight: 800;
      color: #ffc0cb; background: rgba(255,90,116,.12); border: 1px solid rgba(255,90,116,.22);
    }
    h1 { margin: 0 0 8px; font-size: 23px; line-height: 1.28; }
    .sub { margin: 0 0 15px; color: var(--muted); font-size: 14px; line-height: 1.7; }
    .status {
      border: 1px solid var(--line); border-radius: 18px; padding: 12px 14px; margin-bottom: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
    }
    .status-row {
      display: flex; justify-content: space-between; align-items: center; gap: 8px; color: var(--muted);
      font-size: 13px; margin-bottom: 10px;
    }
    .progress { height: 8px; border-radius: 999px; overflow: hidden; background: rgba(255,255,255,.06); }
    .bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .22s ease; }
    .terminal {
      border: 1px solid var(--line); border-radius: 18px; padding: 14px;
      background: linear-gradient(180deg, #0b1020, #0b1020 60%, #0c1220);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.015);
    }
    .question { margin-bottom: 10px; font-size: 17px; font-weight: 900; line-height: 1.6; }
    .hint { margin-bottom: 12px; min-height: 20px; color: transparent; user-select: none; }
    .grid { position: relative; min-height: 250px; display: block; }
    button {
      border: none; border-radius: 16px; padding: 14px 12px; cursor: pointer; color: var(--text);
      font-size: 15px; font-weight: 800; box-shadow: 0 10px 24px rgba(0,0,0,.24);
      transition: transform .12s ease, left .14s ease, top .14s ease, opacity .12s ease;
    }
    button:active { transform: scale(.97); }
    .option {
      position: absolute; width: calc(50% - 8px); min-height: 74px;
      background: linear-gradient(180deg, rgba(130,156,255,.12), rgba(255,255,255,.04));
      border: 1px solid rgba(130,156,255,.13);
    }
    .next { width: 100%; margin-top: 12px; display: none; background: linear-gradient(135deg, var(--accent), var(--accent2)); }
    .fake-close-wrap { margin-top: 10px; display: flex; justify-content: center; }
    .fake-close { width: 100%; background: linear-gradient(180deg, rgba(255,90,116,.16), rgba(255,90,116,.08)); color: #ffc5cf; border: 1px solid rgba(255,90,116,.18); }
    .success { display: none; text-align: center; padding-top: 4px; }
    .success .title { font-size: 24px; font-weight: 900; margin-bottom: 10px; }
    .success .text { color: #d4dcff; font-size: 15px; line-height: 1.8; margin-bottom: 12px; }
    .ghost { width: 100%; background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04)); border: 1px solid rgba(255,255,255,.08); }
    .footer { padding-top: 12px; text-align: center; font-size: 12px; color: rgba(154,167,216,.55); }

    .modal-layer {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      padding: 8px; background: rgba(2,4,10,.78); z-index: 999;
    }
    .modal-layer.show { display: flex; }
    .stack {
      width: min(95vw, 372px); position: relative; min-height: 1px;
    }
    .pop {
      position: relative; background: linear-gradient(180deg, #12192b, #0d1322);
      border: 1px solid rgba(255,90,116,.22); border-radius: 22px; overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,.45); animation: pop .14s ease;
      margin-top: 0;
    }
    .pop + .pop { margin-top: -6px; }
    .pop.alt { border-color: rgba(130,156,255,.2); transform: scale(.99); opacity: .96; }
    .head {
      display: flex; justify-content: space-between; align-items: center; padding: 12px 14px;
      background: linear-gradient(180deg, rgba(255,90,116,.18), rgba(255,90,116,.04));
      border-bottom: 1px solid rgba(255,90,116,.16); font-size: 13px; font-weight: 800; color: #ffc0cb;
    }
    .body { padding: 16px 14px 14px; }
    .title { margin-bottom: 8px; font-size: 19px; font-weight: 900; }
    .text { margin-bottom: 14px; font-size: 14px; line-height: 1.7; color: #d9e0ff; white-space: pre-line; }
    .btn { width: 100%; background: linear-gradient(135deg, var(--danger), #ff7a59); }
    .btn.secondary { margin-top: 8px; background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04)); border: 1px solid rgba(255,255,255,.08); }
    .btn.warn { margin-top: 8px; background: linear-gradient(135deg, #ffb347, #ff8a47); }

    .confetti { position: fixed; inset: 0; pointer-events: none; z-index: 1200; overflow: hidden; }
    .piece { position: absolute; width: 10px; height: 14px; border-radius: 3px; animation: fall linear forwards; opacity: .9; }
    @keyframes fall { from { transform: translateY(-12vh) rotate(0deg); } to { transform: translateY(110vh) rotate(720deg); } }
    @keyframes pop { from { opacity: .55; transform: scale(.95); } to { opacity: 1; transform: scale(1); } }
    .flash { animation: flash .35s ease; }
    @keyframes flash { 0% { box-shadow: 0 0 0 rgba(255,90,116,0); } 50% { box-shadow: 0 0 0 100vmax rgba(255,90,116,.05); } 100% { box-shadow: 0 0 0 rgba(255,90,116,0); } }
  </style>
</head>
<body class="scan">
  <div class="app">
    <div class="shell" id="shell">
      <div class="topbar">
        <div class="dots"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span></div>
        <div>GAGA-OS / Popup Storm</div>
      </div>
      <div class="content">
        <div class="badge">⚠ 检测到 嘎嘎代 具有强烈乱点倾向</div>
        <h1>异常窗口风暴已待命<br>目标：<span style="color:#a9c7ff;">嘎嘎代</span></h1>
        <p class="sub">页面平时很安静。<br>但只要你想跑，就会开始认真折磨你。</p>

        <div class="status">
          <div class="status-row"><span id="stage">清除进度：第 1 / 3 关</span><span id="danger">烦人度：99%</span></div>
          <div class="progress"><div class="bar" id="bar"></div></div>
        </div>

        <div class="terminal">
          <div class="question" id="question"></div>
          <div class="hint">.</div>
          <div class="grid" id="grid"></div>
          <button class="next" id="nextBtn">继续</button>
          <div class="fake-close-wrap"><button class="fake-close" id="fakeCloseBtn">关闭页面</button></div>

          <div class="success" id="successBox">
            <div class="title">窗口风暴已停止 ✅</div>
            <div class="text" id="finalText"></div>
            <button class="ghost" id="restartBtn">再来一次</button>
          </div>
        </div>

        <div class="footer">GitHub Pages 纯静态可部署</div>
      </div>
    </div>
  </div>

  <div class="modal-layer" id="modalLayer">
    <div class="stack" id="stack"></div>
  </div>
  <div class="confetti" id="confetti"></div>

  <script>
    const shell = document.getElementById('shell');
    const stage = document.getElementById('stage');
    const danger = document.getElementById('danger');
    const bar = document.getElementById('bar');
    const question = document.getElementById('question');
    const grid = document.getElementById('grid');
    const nextBtn = document.getElementById('nextBtn');
    const fakeCloseBtn = document.getElementById('fakeCloseBtn');
    const successBox = document.getElementById('successBox');
    const restartBtn = document.getElementById('restartBtn');
    const finalText = document.getElementById('finalText');
    const modalLayer = document.getElementById('modalLayer');
    const stack = document.getElementById('stack');
    const confetti = document.getElementById('confetti');

    let level = 0;
    let closeAttempts = 0;
    let activeStorm = false;
    let pendingSecondary = 0;

    const levels = [
      {
        q: '哪句话最像一本正经胡说八道？',
        options: [
          { text: '我明天要去竞选大阪市长', ok: true },
          { text: '我刚喝了口水', ok: false, fail: '这也太正常了。' },
          { text: '手机快没电了', ok: false, fail: '这个比较像求充电器。' },
          { text: '我有点困', ok: false, fail: '这个像真实状态，不像恶作剧。' }
        ]
      },
      {
        q: '哪个最像“娱乐型诈骗”？',
        options: [
          { text: '骗她说带野猪回家的人', ok: true },
          { text: '借钱不还的人', ok: false, fail: '这个不是娱乐，是拉黑。' },
          { text: '抢最后一口吃的的人', ok: false, fail: '这个罪有点重。' },
          { text: '说不困结果秒睡的人', ok: false, fail: '这只是嘴硬。' }
        ]
      },
      {
        q: '想停止弹窗，最正确的操作是？',
        options: [
          { text: '承认今天被骗得有点可爱', ok: true },
          { text: '长按屏幕三分钟驱邪', ok: false, fail: '驱邪没成功，手麻成功。' },
          { text: '骂网页作者两句', ok: false, fail: '作者提前躲起来了。' },
          { text: '重启人生', ok: false, fail: '该功能暂未开放。' }
        ]
      }
    ];

    const stormText = [
      ['关闭失败', '检测到你试图撤离现场。\n该请求已被系统当场拒绝。'],
      ['再次失败', '你很想跑。\n但这个页面更想留住你。'],
      ['无效操作', '你按得很认真。\n可惜系统并不感动。'],
      ['申请驳回', '关闭按钮只是礼貌性摆设。\n请不要对它抱有幻想。'],
      ['窗口风暴', '本页面已判断你处于乱点状态。\n即将开始连续教育。'],
      ['仍未成功', '每点一次关闭，弹窗都会在心里笑一下。']
    ];

    const extraText = [
      ['附加通知', '你的关闭意图已被记录。'],
      ['背景检查', '系统怀疑你已经开始急了。'],
      ['友情说明', '正确做法不是硬点，是老实通关。'],
      ['温馨提醒', '你越想跑，这页面越兴奋。'],
      ['补充材料', '当前目标：嘎嘎代。状态：有点好骗。']
    ];

    function updateProgress() {
      stage.textContent = `清除进度：第 ${Math.min(level + 1, levels.length)} / ${levels.length} 关`;
      const p = Math.round((level / levels.length) * 100);
      bar.style.width = p + '%';
      danger.textContent = `烦人度：${Math.max(0, 99 - p)}%`;
    }

    function placeButtons() {
      const btns = [...grid.querySelectorAll('.option')];
      const positions = [
        { left: 0, top: 0 },
        { left: 52, top: 10 },
        { left: 4, top: 112 },
        { left: 48, top: 138 }
      ].sort(() => Math.random() - 0.5);
      btns.forEach((b, i) => {
        b.style.left = positions[i].left + '%';
        b.style.top = positions[i].top + 'px';
      });
    }

    function renderLevel() {
      const cur = levels[level];
      updateProgress();
      question.textContent = cur.q;
      grid.innerHTML = '';
      nextBtn.style.display = 'none';
      successBox.style.display = 'none';
      const shuffled = [...cur.options].sort(() => Math.random() - 0.5);
      shuffled.forEach((opt) => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.textContent = opt.text;

        if (!opt.ok) {
          btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const parentW = grid.clientWidth;
            const parentH = grid.clientHeight;
            btn.style.left = Math.max(0, Math.min(parentW - btn.offsetWidth, Math.random() * (parentW - btn.offsetWidth))) + 'px';
            btn.style.top = Math.max(0, Math.min(parentH - btn.offsetHeight, Math.random() * (parentH - btn.offsetHeight))) + 'px';
          }, { passive: false });
        }

        btn.addEventListener('click', () => {
          if (opt.ok) {
            [...grid.children].forEach(x => x.disabled = true);
            nextBtn.style.display = 'block';
          } else {
            triggerStorm(opt.fail || '回答错误。');
          }
        });
        grid.appendChild(btn);
      });
      placeButtons();
    }

    function createPopup(title, text, type = 'main') {
      const pop = document.createElement('div');
      pop.className = 'pop' + (type === 'alt' ? ' alt' : '');
      pop.innerHTML = `
        <div class="head"><span>${type === 'alt' ? 'Background Alert' : 'Security Alert'}</span><span>×</span></div>
        <div class="body">
          <div class="title"></div>
          <div class="text"></div>
          <button class="btn">我知道了</button>
          <button class="btn secondary">继续关闭</button>
          <button class="btn warn">点我试试</button>
        </div>
      `;
      pop.querySelector('.title').textContent = title;
      pop.querySelector('.text').textContent = text;

      const [okBtn, closeBtn, trapBtn] = pop.querySelectorAll('button');
      okBtn.addEventListener('click', () => {
        pop.remove();
        if (!stack.children.length) modalLayer.classList.remove('show');
      });
      closeBtn.addEventListener('click', () => {
        const pair = stormText[Math.floor(Math.random() * stormText.length)];
        const extra = extraText[Math.floor(Math.random() * extraText.length)];
        createAndShow(pair[0], pair[1], extra[0], extra[1], true);
      });
      trapBtn.addEventListener('click', () => {
        const pair = extraText[Math.floor(Math.random() * extraText.length)];
        createAndShow('误触成功', '你又点错了。\n这很符合本页面对你的预期。', pair[0], pair[1], true);
      });
      return pop;
    }

    function createAndShow(title, text, extraTitle = '', extraBody = '', stacked = false) {
      modalLayer.classList.add('show');
      const main = createPopup(title, text, 'main');
      if (stacked && extraBody) {
        const alt = createPopup(extraTitle, extraBody, 'alt');
        const buttons = alt.querySelectorAll('button');
        buttons[1].remove();
        buttons[2].remove();
        stack.appendChild(alt);
      }
      stack.appendChild(main);
      shell.classList.add('flash');
      setTimeout(() => shell.classList.remove('flash'), 300);
    }

    function triggerStorm(baseText = '检测到异常。') {
      closeAttempts += 1;
      const pair = stormText[closeAttempts % stormText.length];
      const extra = extraText[closeAttempts % extraText.length];
      createAndShow(pair[0], baseText + '\n' + pair[1], extra[0], extra[1], true);

      if (!activeStorm) {
        activeStorm = true;
        pendingSecondary = 2;
        const loop = () => {
          if (!activeStorm) return;
          if (pendingSecondary > 0) {
            pendingSecondary -= 1;
            const p = stormText[Math.floor(Math.random() * stormText.length)];
            createAndShow(p[0], p[1], '', '', false);
            setTimeout(loop, 550);
          } else {
            activeStorm = false;
          }
        };
        setTimeout(loop, 420);
      }
    }

    nextBtn.addEventListener('click', () => {
      level += 1;
      if (level < levels.length) {
        renderLevel();
      } else {
        finishGame();
      }
    });

    function finishGame() {
      bar.style.width = '100%';
      danger.textContent = '烦人度：0%';
      stage.textContent = '清除进度：已完成';
      question.textContent = '异常窗口已停止';
      grid.innerHTML = '';
      nextBtn.style.display = 'none';
      fakeCloseBtn.style.display = 'none';
      successBox.style.display = 'block';
      finalText.innerHTML = '恭喜你，嘎嘎代专属窗口风暴已结束。<br><br><strong>愚人节快乐 😏</strong><br><br>系统记录显示：你今天被整到的样子，有点可爱。';
      burstConfetti();
      modalLayer.classList.remove('show');
      stack.innerHTML = '';
    }

    function burstConfetti() {
      confetti.innerHTML = '';
      const colors = ['#86a8ff','#8f6bff','#4ade80','#ff5a74','#ffb347','#c4b5fd'];
      for (let i = 0; i < 46; i++) {
        const p = document.createElement('div');
        p.className = 'piece';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.animationDuration = (2.2 + Math.random() * 1.8) + 's';
        p.style.opacity = String(0.75 + Math.random() * 0.25);
        confetti.appendChild(p);
      }
      setTimeout(() => confetti.innerHTML = '', 4200);
    }

    restartBtn.addEventListener('click', () => {
      level = 0;
      closeAttempts = 0;
      activeStorm = false;
      stack.innerHTML = '';
      modalLayer.classList.remove('show');
      fakeCloseBtn.style.display = 'block';
      renderLevel();
    });

    fakeCloseBtn.addEventListener('click', () => triggerStorm('检测到你主动点击了“关闭页面”。'));

    window.addEventListener('load', renderLevel);

    history.pushState({ prank: true }, '', location.href);
    window.addEventListener('popstate', () => {
      history.pushState({ prank: true }, '', location.href);
      triggerStorm('检测到你试图使用返回键撤离。');
    });
  </script>
</body>
</html>
