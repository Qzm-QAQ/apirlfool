<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>GAGA-OS 安全警报</title>
  <style>
    :root {
      --bg: #080a12;
      --panel: #0f1424;
      --panel-2: #151d34;
      --line: rgba(124, 146, 255, 0.18);
      --text: #e8ecff;
      --muted: #9ba8d8;
      --accent: #6ea8ff;
      --accent-2: #8a6bff;
      --danger: #ff5470;
      --ok: #4ade80;
      --warn: #ffb84d;
      --shadow: 0 22px 60px rgba(0, 0, 0, 0.45);
      --radius: 20px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      width: 100%;
      background:
        radial-gradient(circle at 20% 0%, rgba(110,168,255,0.13), transparent 30%),
        radial-gradient(circle at 100% 10%, rgba(138,107,255,0.18), transparent 25%),
        linear-gradient(180deg, #060810, #0a0f1a 50%, #090c15 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
      overflow-x: hidden;
    }

    .scanlines::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03) 0px,
        rgba(255,255,255,0.03) 1px,
        transparent 2px,
        transparent 4px
      );
      opacity: 0.18;
      z-index: 0;
    }

    .app {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 14px 24px;
      position: relative;
      z-index: 1;
    }

    .shell {
      width: 100%;
      max-width: 430px;
      background: linear-gradient(180deg, rgba(18,24,42,0.95), rgba(12,16,28,0.98));
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .topbar {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0));
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      color: var(--muted);
    }

    .dots { display: flex; gap: 6px; }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(255,255,255,0.16);
    }
    .dot.red { background: #ff5f57; }
    .dot.yellow { background: #febc2e; }
    .dot.green { background: #28c840; }

    .content { padding: 18px 16px 18px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,84,112,0.12);
      color: #ff9eb1;
      border: 1px solid rgba(255,84,112,0.25);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    h1 { font-size: 23px; line-height: 1.3; margin: 0 0 8px; letter-spacing: 0.2px; }
    .sub { color: var(--muted); font-size: 14px; line-height: 1.7; margin: 0 0 16px; }

    .status-box {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px 14px;
      margin-bottom: 14px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .progress { height: 8px; border-radius: 999px; background: rgba(255,255,255,0.06); overflow: hidden; }
    .progress-bar {
      height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 0.25s ease; box-shadow: 0 0 20px rgba(110,168,255,0.4);
    }

    .terminal {
      background: linear-gradient(180deg, #0b1020, #0b1020 60%, #0c1324);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.015);
    }

    .question { font-size: 17px; font-weight: 800; line-height: 1.6; margin-bottom: 10px; }
    .hint { color: var(--muted); font-size: 13px; line-height: 1.6; min-height: 38px; margin-bottom: 12px; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      position: relative;
      min-height: 220px;
    }

    button {
      border: none; border-radius: 16px; padding: 14px 12px; color: var(--text); font-size: 15px; font-weight: 800;
      cursor: pointer; transition: transform 0.12s ease, opacity 0.12s ease, box-shadow 0.12s ease, top 0.18s ease, left 0.18s ease;
      box-shadow: 0 10px 24px rgba(0,0,0,0.24);
    }
    button:active { transform: scale(0.97); }

    .option {
      background: linear-gradient(180deg, rgba(110,168,255,0.12), rgba(255,255,255,0.04));
      border: 1px solid rgba(110,168,255,0.14);
      min-height: 76px;
    }

    .option.floaty {
      position: absolute;
      width: calc(50% - 8px);
    }

    .primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); width: 100%; margin-top: 12px; display: none; }
    .danger-ghost { background: linear-gradient(180deg, rgba(255,84,112,0.16), rgba(255,84,112,0.08)); border: 1px solid rgba(255,84,112,0.18); }

    .success { display: none; text-align: center; padding-top: 6px; }
    .success .title { font-size: 24px; font-weight: 900; margin-bottom: 10px; }
    .success .text { color: #ced8ff; font-size: 15px; line-height: 1.8; margin-bottom: 12px; }
    .ghost { width: 100%; background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04)); border: 1px solid rgba(255,255,255,0.08); }
    .footer { text-align: center; padding-top: 12px; color: rgba(155,168,216,0.55); font-size: 12px; }

    .modal {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center; padding: 10px;
      background: rgba(2, 4, 10, 0.72); z-index: 999;
    }
    .modal.show { display: flex; }

    .modal-stack {
      width: min(94vw, 370px);
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
    }

    .pop {
      background: linear-gradient(180deg, #12192b, #0d1322);
      border: 1px solid rgba(255,84,112,0.22);
      border-radius: 22px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.42);
      overflow: hidden;
      animation: pop 0.16s ease;
      transform-origin: center;
    }

    .pop.secondary {
      opacity: 0.94;
      transform: scale(0.985) translateY(-2px);
      border-color: rgba(110,168,255,0.20);
    }

    @keyframes pop {
      from { opacity: 0.5; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .pop-head {
      display: flex; align-items: center; justify-content: space-between; padding: 12px 14px;
      background: linear-gradient(180deg, rgba(255,84,112,0.18), rgba(255,84,112,0.04));
      border-bottom: 1px solid rgba(255,84,112,0.16); font-size: 13px; color: #ffc1cc; font-weight: 800;
    }

    .pop-body { padding: 16px 14px 14px; }
    .pop-title { font-size: 19px; font-weight: 900; margin-bottom: 8px; }
    .pop-text { color: #d4dcff; font-size: 14px; line-height: 1.7; margin-bottom: 14px; white-space: pre-line; }
    .pop-btn { width: 100%; background: linear-gradient(135deg, var(--danger), #ff7a59); }
    .sub-btn { width: 100%; margin-top: 8px; background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04)); border: 1px solid rgba(255,255,255,0.08); color: var(--text); }

    .flash { animation: flash 0.35s ease; }
    @keyframes flash {
      0% { box-shadow: 0 0 0 rgba(255,84,112,0); }
      50% { box-shadow: 0 0 0 100vmax rgba(255,84,112,0.05); }
      100% { box-shadow: 0 0 0 rgba(255,84,112,0); }
    }

    .confetti { position: fixed; inset: 0; pointer-events: none; z-index: 1200; overflow: hidden; }
    .piece { position: absolute; width: 10px; height: 14px; border-radius: 3px; animation: fall linear forwards; opacity: 0.9; }
    @keyframes fall { from { transform: translateY(-12vh) rotate(0deg); } to { transform: translateY(110vh) rotate(720deg); } }

    .close-trap {
      margin-top: 10px;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .fake-close-btn {
      background: linear-gradient(180deg, rgba(255,84,112,0.16), rgba(255,84,112,0.08));
      border: 1px solid rgba(255,84,112,0.18);
      color: #ffc1cc;
      width: 100%;
    }
  </style>
</head>
<body class="scanlines">
  <div class="app">
    <div class="shell" id="shell">
      <div class="topbar">
        <div class="dots">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
        </div>
        <div>GAGA-OS / Threat Monitor</div>
      </div>

      <div class="content">
        <div class="badge">⚠ 高危提示：检测到 嘎嘎 可能会尝试关闭页面</div>
        <h1>系统警报：<br>发现可疑目标 <span style="color:#9cc2ff;">嘎嘎代</span></h1>
        <p class="sub">现在不会主动弹。<br>但一旦你试图关闭、返回、撤离，本系统就会立刻进入折磨模式。</p>

        <div class="status-box">
          <div class="status-row">
            <span id="stageText">清除进度：第 1 / 3 关</span>
            <span id="threatText">捣蛋值：99%</span>
          </div>
          <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
          </div>
        </div>

        <div class="terminal">
          <div class="question" id="question"></div>
          <div class="hint" id="hint"></div>
          <div class="grid" id="grid"></div>
          <button class="primary" id="nextBtn">继续清除风险</button>

          <div class="close-trap">
            <button class="fake-close-btn" id="fakeCloseBtn">关闭页面</button>
          </div>

          <div class="success" id="successBox">
            <div class="title">病毒清除完成 ✅</div>
            <div class="text" id="finalText"></div>
            <button class="ghost" id="restartBtn">重新感染一下</button>
          </div>
        </div>

        <div class="footer">可直接部署到 GitHub Pages · 单文件静态网页</div>
      </div>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-stack" id="modalStack">
      <div class="pop secondary" id="secondaryPop" style="display:none;">
        <div class="pop-head">
          <span>Background Alert</span>
          <span>!</span>
        </div>
        <div class="pop-body">
          <div class="pop-title" id="secondaryTitle">还有一个问题</div>
          <div class="pop-text" id="secondaryText"></div>
        </div>
      </div>

      <div class="pop">
        <div class="pop-head">
          <span>Security Alert</span>
          <span>×</span>
        </div>
        <div class="pop-body">
          <div class="pop-title" id="modalTitle">警报</div>
          <div class="pop-text" id="modalText"></div>
          <button class="pop-btn" id="modalBtn">我认了，继续</button>
          <button class="sub-btn" id="subBtn">还是想关闭</button>
        </div>
      </div>
    </div>
  </div>

  <div class="confetti" id="confetti"></div>

  <script>
    const shell = document.getElementById('shell');
    const stageText = document.getElementById('stageText');
    const threatText = document.getElementById('threatText');
    const progressBar = document.getElementById('progressBar');
    const question = document.getElementById('question');
    const hint = document.getElementById('hint');
    const grid = document.getElementById('grid');
    const nextBtn = document.getElementById('nextBtn');
    const fakeCloseBtn = document.getElementById('fakeCloseBtn');
    const successBox = document.getElementById('successBox');
    const restartBtn = document.getElementById('restartBtn');
    const finalText = document.getElementById('finalText');
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modalTitle');
    const modalText = document.getElementById('modalText');
    const modalBtn = document.getElementById('modalBtn');
    const subBtn = document.getElementById('subBtn');
    const secondaryPop = document.getElementById('secondaryPop');
    const secondaryTitle = document.getElementById('secondaryTitle');
    const secondaryText = document.getElementById('secondaryText');
    const confetti = document.getElementById('confetti');

    let level = 0;
    let closeAttempts = 0;
    let escapedTriggered = false;

    const levels = [
      {
        q: '第一层扫描：哪句话最像“嘎嘎代专属木马”？',
        h: '注意：选项位置会变，别形成肌肉记忆。',
        floaty: true,
        options: [
          { text: '我明天要去竞选大阪市长', ok: true },
          { text: '我刚喝了口水', ok: false, fail: '这不像木马，这像活着。' },
          { text: '我现在有点困', ok: false, fail: '这太真实，不够恶作剧。' },
          { text: '手机信号一般', ok: false, fail: '这个锅该运营商背。' }
        ]
      },
      {
        q: '第二层验证：哪种骗子最可能被嘎嘎代勉强原谅？',
        h: '这关的错误选项有点会跑。',
        floaty: true,
        options: [
          { text: '骗她说带野猪回家的人', ok: true },
          { text: '借钱不还的人', ok: false, fail: '这不是玩笑，这是永久拉黑。' },
          { text: '抢最后一口吃的的人', ok: false, fail: '这个级别已经接近战争行为。' },
          { text: '说不困结果秒睡的人', ok: false, fail: '这属于嘴硬，不够坏。' }
        ]
      },
      {
        q: '最终解除：想停止弹窗，最正确的操作是？',
        h: '请老实承认现实。',
        floaty: false,
        options: [
          { text: '承认今天被骗得有点可爱', ok: true },
          { text: '长按屏幕三分钟驱邪', ok: false, fail: '驱邪失败，手麻成功。' },
          { text: '骂网页制作者两句', ok: false, fail: '作者很脆弱，已先躲起来。' },
          { text: '重启人生', ok: false, fail: '当前版本不支持此高级功能。' }
        ]
      }
    ];

    function randomRange(min, max) {
      return Math.random() * (max - min) + min;
    }

    function openModal(title, text, extraTitle = '', extraText = '') {
      modalTitle.textContent = title;
      modalText.textContent = text;
      if (extraText) {
        secondaryPop.style.display = 'block';
        secondaryTitle.textContent = extraTitle || '附加警告';
        secondaryText.textContent = extraText;
      } else {
        secondaryPop.style.display = 'none';
      }
      modal.classList.add('show');
      shell.classList.add('flash');
      setTimeout(() => shell.classList.remove('flash'), 350);
    }

    function closeModal() {
      modal.classList.remove('show');
    }

    function punishCloseAttempt() {
      closeAttempts += 1;
      if (closeAttempts === 1) {
        openModal(
          '拦截成功',
          '检测到你试图关闭页面。\n系统判断：你心虚了。',
          '后台提示',
          '关闭页面并不能清除恶作剧，只会显得你更好骗。'
        );
      } else if (closeAttempts === 2) {
        openModal(
          '再次拦截',
          '你真的很执着。\n但本系统的执着更可怕。',
          '额外检查',
          '已自动把你的“逃跑倾向”上报给嘎嘎代专属监控。'
        );
      } else if (closeAttempts === 3) {
        openModal(
          '第三次警告',
          '你现在有两个选择：\n1. 继续被弹窗教育\n2. 老实通关',
          '友情羞辱',
          '系统备注：目标多次失败撤离，疑似被整急了。'
        );
      } else {
        openModal(
          '无限驳回',
          `第 ${closeAttempts} 次关闭申请已被驳回。\n请停止无意义挣扎。`,
          '附加通知',
          '你每点一次关闭，弹窗都在心里笑一次。'
        );
      }
    }

    modalBtn.addEventListener('click', closeModal);
    subBtn.addEventListener('click', () => {
      const lines = [
        '再次确认：你还是关不掉。',
        '按钮按得很认真，但系统并不感动。',
        '你越想跑，这页面越来劲。',
        '本系统已将“还是想关闭”识别为撒娇。'
      ];
      openModal('仍然失败', lines[Math.floor(Math.random() * lines.length)], '补充说明', '建议切换策略：认真做题，而不是继续硬点。');
    });

    function setProgress() {
      stageText.textContent = `清除进度：第 ${Math.min(level + 1, levels.length)} / ${levels.length} 关`;
      const percent = Math.round((level / levels.length) * 100);
      progressBar.style.width = percent + '%';
      threatText.textContent = `捣蛋值：${Math.max(0, 99 - percent)}%`;
    }

    function placeFloatyButtons() {
      const buttons = [...grid.querySelectorAll('.option.floaty')];
      const positions = [
        { left: '0%', top: '0px' },
        { left: '52%', top: '8px' },
        { left: '4%', top: '104px' },
        { left: '48%', top: '126px' }
      ];
      positions.sort(() => Math.random() - 0.5);
      buttons.forEach((btn, i) => {
        btn.style.left = positions[i].left;
        btn.style.top = positions[i].top;
      });
    }

    function renderLevel() {
      const current = levels[level];
      setProgress();
      question.textContent = current.q;
      hint.textContent = current.h;
      grid.innerHTML = '';
      nextBtn.style.display = 'none';
      successBox.style.display = 'none';

      const shuffled = [...current.options].sort(() => Math.random() - 0.5);
      shuffled.forEach((opt) => {
        const btn = document.createElement('button');
        btn.className = 'option' + (current.floaty ? ' floaty' : '');
        if (!opt.ok) btn.classList.add('danger-ghost');
        btn.textContent = opt.text;

        if (current.floaty && !opt.ok) {
          btn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const parentW = grid.clientWidth;
            const parentH = grid.clientHeight;
            btn.style.left = Math.max(0, Math.min(parentW - btn.offsetWidth, randomRange(0, parentW - btn.offsetWidth))) + 'px';
            btn.style.top = Math.max(0, Math.min(parentH - btn.offsetHeight, randomRange(0, parentH - btn.offsetHeight))) + 'px';
          }, { passive: false });
        }

        btn.addEventListener('click', () => {
          if (opt.ok) {
            [...grid.children].forEach(x => x.disabled = true);
            btn.style.outline = '2px solid rgba(74,222,128,0.5)';
            btn.style.boxShadow = '0 0 0 1px rgba(74,222,128,0.18), 0 10px 24px rgba(0,0,0,0.24)';
            hint.textContent = '验证通过。系统认为你终于开始合作了。';
            nextBtn.style.display = 'block';
          } else {
            openModal('验证失败', opt.fail || '答案不对，请重新作答。', '系统旁白', '错了也没关系，反正你今天主要任务是被整。');
          }
        });
        grid.appendChild(btn);
      });

      if (current.floaty) placeFloatyButtons();
    }

    nextBtn.addEventListener('click', () => {
      level += 1;
      if (level < levels.length) {
        renderLevel();
      } else {
        finishGame();
      }
    });

    function finishGame() {
      progressBar.style.width = '100%';
      threatText.textContent = '捣蛋值：0%';
      stageText.textContent = '清除进度：已完成';
      question.textContent = '系统恢复正常';
      hint.textContent = '弹窗权限已撤销。';
      grid.innerHTML = '';
      nextBtn.style.display = 'none';
      fakeCloseBtn.style.display = 'none';
      successBox.style.display = 'block';
      finalText.innerHTML = '恭喜你，嘎嘎代专属病毒已清除。<br><br>其实这一切只是想告诉你：<br><strong>愚人节快乐 😏</strong><br><br>顺便系统记录显示：<br>你今天被整到的样子，有点可爱。';
      burstConfetti();
    }

    function burstConfetti() {
      confetti.innerHTML = '';
      const colors = ['#6ea8ff', '#8a6bff', '#4ade80', '#ff5470', '#ffb84d', '#c4b5fd'];
      for (let i = 0; i < 46; i++) {
        const p = document.createElement('div');
        p.className = 'piece';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.animationDuration = (2.2 + Math.random() * 1.8) + 's';
        p.style.opacity = String(0.75 + Math.random() * 0.25);
        confetti.appendChild(p);
      }
      setTimeout(() => confetti.innerHTML = '', 4200);
    }

    restartBtn.addEventListener('click', () => {
      level = 0;
      closeAttempts = 0;
      fakeCloseBtn.style.display = 'block';
      renderLevel();
    });

    fakeCloseBtn.addEventListener('click', punishCloseAttempt);

    window.addEventListener('load', () => {
      renderLevel();
    });

    // 只有用户尝试“关闭/返回”时才触发弹窗
    history.pushState({ prank: true }, '', location.href);
    window.addEventListener('popstate', () => {
      history.pushState({ prank: true }, '', location.href);
      if (!escapedTriggered) escapedTriggered = true;
      punishCloseAttempt();
    });
  </script>
</body>
</html>
